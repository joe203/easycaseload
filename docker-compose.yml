# EasyCaseload — production compose (run on the droplet)
# Network is `web` — the shared app network on this droplet (stockdale-church
# uses it too; verified 2026-06-12). There is no n8n_default here: n8n runs on
# a different host, and the app reaches Supabase via its public HTTPS URL.
# Host port 3010 → container 3000; Caddy (host systemd) proxies localhost:3010.
#
#   docker compose --env-file .env.local up -d --build

services:
  easycaseload:
    container_name: easycaseload
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: ${NEXT_PUBLIC_ENABLE_GOOGLE_AUTH:-false}
    image: easycaseload
    restart: unless-stopped
    ports:
      - "3010:3000"
    env_file:
      - .env.local
    networks:
      - web

networks:
  web:
    external: true
