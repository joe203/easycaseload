<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded green square background with subtle book spine effect -->
  <defs>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a5f4a"/>
      <stop offset="8%" style="stop-color:#1a5f4a"/>
      <stop offset="8%" style="stop-color:#228B6B"/>
      <stop offset="100%" style="stop-color:#228B6B"/>
    </linearGradient>
  </defs>
  
  <!-- Main book/square shape -->
  <rect x="2" y="2" width="28" height="28" rx="5" ry="5" fill="url(#bookGrad)"/>
  
  <!-- Subtle page lines on right side -->
  <line x1="26" y1="6" x2="26" y2="26" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  <line x1="24" y1="6" x2="24" y2="26" stroke="#ffffff" stroke-width="0.3" opacity="0.2"/>
  
  <!-- Letter E - clean, modern -->
  <text x="16" y="23" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">E</text>
</svg>
