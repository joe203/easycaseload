<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family:sans-serif;color:#1a1a1a;max-width:480px;margin:0 auto;padding:32px 16px">
  <h2 style="margin-bottom:8px">Confirm your email</h2>
  <p style="margin-bottom:24px">Welcome to EasyCaseload! Tap below to confirm your email and finish setting up your account. This link works on any device.</p>
  <p>
    <a href="https://easycaseload.com/auth/confirm?token_hash={{ .TokenHash }}&type=signup&next=/app/onboarding"
       style="display:inline-block;background:#16a34a;color:#fff;text-decoration:none;padding:12px 24px;border-radius:6px;font-weight:600">
      Confirm my email
    </a>
  </p>
  <p style="margin-top:24px;font-size:14px;color:#6b7280">If you didn't create an EasyCaseload account, you can safely ignore this email.</p>
</body>
</html>
